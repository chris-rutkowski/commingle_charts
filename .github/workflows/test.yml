name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  all-tests:
    runs-on: ubuntu-latest
    # Run inside the exact same Flutter image used locally to generate goldens
    # (see scripts/containerised_test.sh), so golden rasterization matches
    # byte-for-byte.
    # Pinned by digest so the tag can never drift under us.
    container:
      image: ghcr.io/adrianjagielak/flutter:3.44.2@sha256:8e2fb6903d05fb8c7fdd5c218f7d7953e74315b1f918355310ac2017738f9e23

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure git safe directory
        run: git config --global --add safe.directory '*'

      - name: Verify Flutter version matches flutter-version.txt
        run: |
          expected="$(cat flutter-version.txt)"
          actual="$(flutter --version | head -n1 | awk '{print $2}')"
          echo "expected=${expected} actual=${actual}"
          if [ "${expected}" != "${actual}" ]; then
            echo "::error::Image Flutter ${actual} does not match flutter-version.txt (${expected})"
            exit 1
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter unit tests
        run: flutter test --reporter=failures-only

      - name: Upload golden failures
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: '**/failures/**'
          if-no-files-found: ignore
          retention-days: 1

      - name: Analyze package
        run: dart analyze --fatal-infos lib test

      - name: Example pub get
        run: flutter pub get
        working-directory: example

      - name: Analyze example
        run: dart analyze --fatal-infos example/lib
